<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Disney Cruise Fleet — Live Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>

  <!-- HUD overlay -->
  <div id="hud">
    <div id="hud-title">✦ Disney Cruise Fleet</div>
    <div id="hud-clock"></div>
    <div id="hud-mode-bar">
      <button class="mode-btn active" data-mode="realtime"  title="1">Real Time</button>
      <button class="mode-btn"        data-mode="timelapse" title="2">Time Lapse</button>
      <button class="mode-btn"        data-mode="follow"    title="3">Follow Ship</button>
    </div>
  </div>

  <!-- Fullscreen button (top-right) -->
  <button id="btn-fullscreen" title="Fullscreen (`)">
    <svg id="fs-icon-enter" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <path d="M1 1h5v1.5H2.5V6H1V1zm9 0h5v5h-1.5V2.5H10V1zM1 10h1.5v3.5H6V15H1v-5zm12.5 3.5H10V15h5v-5h-1.5v3.5z"/>
    </svg>
    <svg id="fs-icon-exit" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:none">
      <path d="M5.5 1H7v5H1V4.5h3.5V1zm3 0H10v3.5H13.5V6H8V1zm-8 9h6v5H5v-3.5H1.5V10zm9 0h1.5v3.5H15V15H9v-5h.5z"/>
    </svg>
  </button>

  <!-- Time-lapse controls (shown only in timelapse mode) -->
  <div id="tl-controls" class="hidden">
    <button id="tl-play" title="Space">▶</button>
    <input  id="tl-slider" type="range" min="0" max="1000" value="0" />
    <div id="tl-date"></div>
    <div id="tl-speed-wrap">
      <button id="tl-slower" title="↓">−</button>
      <span   id="tl-speed-label">1 wk/s</span>
      <button id="tl-faster" title="↑">+</button>
    </div>
  </div>

  <!-- Ship info card (shown in follow mode) -->
  <div id="ship-card" class="hidden">
    <div id="card-name"></div>
    <div id="card-status"></div>
    <div id="card-dest"></div>
  </div>

  <!-- Loading screen -->
  <div id="loading">
    <div id="loading-inner">
      <div id="loading-title">✦ Disney Cruise Fleet</div>
      <div id="loading-sub">Loading ship positions…</div>
      <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    </div>
  </div>

  <!-- Key hint (fade out after a few seconds) -->
  <div id="key-hint">
    <span>1</span> Real Time &nbsp;
    <span>2</span> Time Lapse &nbsp;
    <span>3</span> Follow Ship &nbsp;
    <span>Space</span> Play/Pause
  </div>

  <!-- Easter egg overlay (above map, below HUD) -->
  <div id="egg-overlay"></div>

  <!-- Settings panel -->
  <div id="settings-panel" class="hidden">
    <div id="settings-title">✦ Settings</div>

    <div class="settings-section">
      <div class="settings-label">Easter Eggs</div>
      <label class="toggle-row">
        <span>Enable surprises</span>
        <input type="checkbox" id="set-eggs-enabled" checked />
      </label>
      <div class="settings-label" style="margin-top:10px">Frequency</div>
      <div id="freq-buttons">
        <button class="freq-btn" data-freq="calm">Calm</button>
        <button class="freq-btn active" data-freq="normal">Magical</button>
        <button class="freq-btn" data-freq="magical">Chaotic</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-label">Water Effects</div>
      <label class="toggle-row">
        <span>Animated wake trail</span>
        <input type="checkbox" id="set-wake-enabled" checked />
      </label>
    </div>
  </div>

  <!-- Settings gear button (below fullscreen) -->
  <button id="btn-settings" title="Settings">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492M5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0"/>
      <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.474l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115z"/>
    </svg>
  </button>

  <script src="app.js"></script>
  <script src="easter.js"></script>
</body>
</html>
